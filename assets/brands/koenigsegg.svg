<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo Koenigsegg -->
  <rect width="200" height="200" fill="#202027" rx="10"/>
  
  <!-- Escudo angulado -->
  <polygon points="100,45 140,70 135,125 100,145 65,125 60,70" fill="none" stroke="#ffd400" stroke-width="2"/>
  
  <!-- K interior -->
  <text x="100" y="100" font-size="40" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" font-weight="bold">K</text>
  
  <text x="100" y="175" font-size="12" fill="#ffd400" text-anchor="middle" font-weight="bold">KOENIGSEGG</text>
</svg>