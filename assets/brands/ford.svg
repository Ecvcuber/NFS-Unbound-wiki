<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo Ford -->
  <rect width="200" height="200" fill="#202027" rx="10"/>
  
  <!-- Óvalo Ford -->
  <ellipse cx="100" cy="100" rx="50" ry="35" fill="none" stroke="#ffd400" stroke-width="2"/>
  <ellipse cx="100" cy="100" rx="45" ry="30" fill="none" stroke="#00e5ff" stroke-width="1"/>
  
  <!-- Texto F -->
