<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo BMW minimalista -->
  <rect width="200" height="200" fill="#202027" rx="10"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ffd400" stroke-width="3"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#00e5ff" stroke-width="2"/>
  
  <!-- Cuadrantes del círculo BMW -->
  <circle cx="80" cy="85" r="25" fill="none" stroke="#ffd400" stroke-width="2"/>
  <circle cx="120" cy="85" r="25" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="80" cy="115" r="25" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="120" cy="115" r="25" fill="none" stroke="#ffd400" stroke-width="2"/>
  
  <text x="100" y="175" font-size="14" fill="#ffd400" text-anchor="middle" font-weight="bold">BMW</text>
</svg>