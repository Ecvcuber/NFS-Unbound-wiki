<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo Porsche -->
  <rect width="200" height="200" fill="#202027" rx="10"/>
  
  <!-- Escudo -->
  <path d="M 100 50 L 130 70 L 130 120 Q 100 135 70 120 L 70 70 Z" fill="none" stroke="#ffd400" stroke-width="2"/>
  
  <!-- Caballo Porsche -->
  <g transform="translate(100, 90)">
    <path d="M -15 -10 Q -10 -15 0 -15 Q 10 -15 15 -10" fill="none" stroke="#00e5ff" stroke-width="2"/>
    <circle cx="-8" cy="0" r="3" fill="#ffd400"/>
    <circle cx="8" cy="0" r="3" fill="#ffd400"/>
  </g>
  
  <text x="100" y="175" font-size="14" fill="#ffd400" text-anchor="middle" font-weight="bold">PORSCHE</text>
</svg>