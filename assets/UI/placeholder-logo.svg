<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo -->
  <rect width="200" height="200" fill="#202027" rx="10"/>
  
  <!-- Borde -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#ffd400" stroke-width="2" rx="8"/>
  
  <!-- Icono de marca genérico -->
  <g transform="translate(100, 100)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00e5ff" stroke-width="2"/>
    
    <!-- Símbolo de marca (?)-->
    <text x="0" y="15" font-size="40" font-weight="bold" fill="#ffd400" text-anchor="middle" dominant-baseline="middle">?</text>
  </g>
  
  <!-- Texto -->
  <text x="100" y="170" font-size="12" fill="#a8a8b3" text-anchor="middle" font-family="Arial">LOGO</text>
</svg>